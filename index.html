        // 2. Nuestro Componente Carta
        function CartaClashRoyale({ nombre, nivelMax, rareza, urlFoto, urlHeroe, urlEvo }) {
            const [vistaActual, setVistaActual] = useState("normal");

            let urlImagen = urlFoto;

            } else if (vistaActual === "heroe") {
                urlImagen = urlHeroe;
            }
            
            return (
                <div className="card">
                    <h3>{nombre}</h3>
                    {/* Corregido: antes decía {nivel}, la prop es {nivelMax} */}
                    <p>Nivel Máximo: {nivelMax}</p> 
                    <p>Rareza: {rareza}</p>
                    
                    <img src={urlImagen} alt={nombre} />
                    
                    <div className="buttons-container">
                        {/* Este boton existe solo si la url de la evo Existe*/}
                        {urlEvo && (
                            <button 
                                className="evo-button"
                                onClick={() => setVistaActual(vistaActual === "evo" ? "normal" : "evo")}
                            >
                                {vistaActual === "evo" ? "Volver" : "Ver Evo"}
                            </button>
                        )}

                            >

                            </button>
                        )}
                    </div>
                </div>
            );

        // ----------------- COMPONENTE COFRESORPRESA (nuevo) -----------------
        function CofreSorpresa() {
            const [premio, setPremio] = useState('');
            const listaPremios = ['💎 100 gemas', '💰 500 monedas', '❌ Nada... sigue intentando', '🃏 Carta legendaria', '✨ Poción de velocidad'];

            const abrirCofre = () => {
                const indiceAleatorio = Math.floor(Math.random() * listaPremios.length);
                setPremio(listaPremios[indiceAleatorio]);
            };

            return (
                <div style={{ textAlign: 'center', margin: '1rem auto', padding: '1rem', backgroundColor: '#ffffff',border: '1px solid #e5e7eb', borderRadius: '16px', maxWidth: '400px' }}>
                    <h3>🎁 Cofre Sorpresa 🎁</h3>
                    <button 
                        onClick={abrirCofre} 
                         style={{ 
                            borderRadius: '8px', 
                            padding: '8px 16px', 
                            fontSize: '1rem', 
                            cursor: 'pointer',
                            border: 'none',
                            backgroundColor: '#fbbf24',
                            color: 'white',
                            fontWeight: 'bold',
                            transition: 'transform 0.2s, background-color 0.2s'
                        }}
                        onMouseEnter={(e) => {
                            e.currentTarget.style.transform = 'scale(1.1)';
                            e.currentTarget.style.backgroundColor = '#9333ea'; // violeta
                        }}
                        onMouseLeave={(e) => {
                            e.currentTarget.style.transform = 'scale(1)';
                            e.currentTarget.style.backgroundColor = '#fbbf24';
                        }}
                    >
                        Abrir cofre
                    </button>
                    {premio && <p style={{ marginTop: '0.5rem', fontWeight: 'bold', color: '#92400e' }}>¡Obtuviste: {premio}!</p>}
                </div>
            );
        }
        // 3. Componente Principal App
        function App() {
            // Guardamos TODAS las cartas que vienen de la API
            const [cartas, setCartas] = useState([]);
            // Límite de cartas a mostrar (por defecto 35)
            const [limite, setLimite] = useState(35);
            // Las cartas que realmente se muestran (derivado del estado)
            const cartasMostradas = cartas.slice(0, limite);

            useEffect(() => {
                async function obtenerCartas() {
                    try {
                        const response = await fetch(API_CONFIG.BASE_URL, {
                            headers: API_CONFIG.HEADERS
                        });
                        const data = await response.json();
                        // Guardamos TODAS las cartas (sin recortar)
                        setCartas(data.items);
                    } catch(error) {
                        console.log(error);
                    }
                }
                obtenerCartas();
            }, []); // Solo se ejecuta una vez al montar

            return (
                <>
                    {/* Pasamos las cartasMostradas para que las estadísticas se actualicen */}
                    <Header cartas={cartasMostradas} />
                    <main>
                        {/* Control deslizante para modificar la cantidad de cartas */}
                        <div style={{ textAlign: 'center', margin: '1rem' }}>
                            <label>
                                <strong>Mostrar {limite} cartas (de {cartas.length} disponibles)</strong>
                                <input 
                                    type="range" 
                                    min="1" 
                                    max={cartas.length || 1} 
                                    value={limite} 
                                    onChange={(e) => setLimite(Number(e.target.value))}
                                    style={{ marginLeft: '10px', width: '200px' }}
                                />
                            </label>
                        </div>

                        <CofreSorpresa />
                        <div id="cards-container">
                            {cartasMostradas.map(carta => (
                                <CartaClashRoyale 
                                    key={carta.name} 
                                    nombre={carta.name} 
                                    nivelMax={carta.maxLevel} 
                                    rareza={rarezas[carta.rarity]} 
                                    urlFoto={carta.iconUrls.medium} 
                                    urlHeroe={carta.iconUrls.heroMedium || ""} 
                                    urlEvo={carta.iconUrls.evolutionMedium || ""}
                                />
                            ))}
                        </div>
                    </main>
                    <Footer />
                </>
            );
        }

        // 4. Renderizado
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
